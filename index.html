<!doctype html>
<html>
  <head>
    <title>My website!</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico?">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6804697564161122"
     crossorigin="anonymous"></script>
  <style>
  .mainbtn {
    background-color: #ff0000;
    width: 25vw;
    color: white;
    font-size: 20px;
    font-family: arial;
    padding-top: 15px;
    padding-bottom: 15px;
    border: none;
    border-radius: 0px;
    border-style: ridge;
    border-color: #ff9900;
    cursor: pointer;
  }
  @keyframes pulseAnimation {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .pulse {
    animation-name: pulseAnimation;
    animation-duration: 1s;
    animation-timing-function: ease;
    animation-iteration-count: infinite;
    animation-direction: normal;
    animation-fill-mode: both;
  }
  .mainbtn:hover {
    background-color: #cc0000;
  }
</style>
  </head>
  <body>
    <p><strong>Welcome to my website!</strong> currently, I'm not doing much, but that could change!</p>
    
    <button class="mainbtn" onclick="alert('or or a nor hello')">Press me!</button><!--
    --><button class="mainbtn" onclick="alert('or or a nor hello')">Also me!</button><!--
    --><button class="mainbtn" onclick="alert('or or a nor hello')">Maybe me!</button><!--
    --><button class="mainbtn" onclick="alert('or or a nor hello')">Or me!</button>
    <h1 class="pulse">Sample Text</h1>
  </body>
</html>
